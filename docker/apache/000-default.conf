<VirtualHost *:80>
    ServerName localhost
    DocumentRoot /var/www/html/docroot

    <Directory /var/www/html/docroot>
        AllowOverride All
        Require all granted
        Options -Indexes +FollowSymLinks
    </Directory>

    ErrorLog ${APACHE_LOG_DIR}/error.log
    CustomLog ${APACHE_LOG_DIR}/access.log combined
</VirtualHost>